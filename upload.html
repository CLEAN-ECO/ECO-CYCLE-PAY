<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle Pay | Upload Waste</title>
    <meta
        name="description"
        content="Upload waste details for verification with EcoCycle Pay."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body id="uploadPage">
    <main class="utility-page">
        <section class="utility-shell">
            <header class="page-header">
                <a href="dashboard.html" class="back-link">Back</a>
                <p class="dashboard-kicker">Upload Waste</p>
                <h1>Submit recyclable waste for review</h1>
                <p class="page-subtitle">Add the category, quantity, location, and an optional image for demo upload.</p>
            </header>

            <section class="auth-card utility-card">
                <form id="uploadForm" class="auth-form" novalidate>
                    <div class="form-grid">
                        <label class="field">
                            <span>Waste Type</span>
                            <select name="waste_type" required>
                                <option value="">Select waste type</option>
                                <option value="Plastics">Plastics</option>
                                <option value="Papers">Papers</option>
                                <option value="Metals">Metals</option>
                                <option value="Beverage Cans">Beverage Cans</option>
                                <option value="Cartons">Cartons</option>
                            </select>
                        </label>

                        <label class="field">
                            <span>Quantity (kg)</span>
                            <input type="number" name="quantity" min="1" placeholder="Enter quantity" required>
                        </label>

                        <label class="field field-full">
                            <span>Location</span>
                            <input type="text" name="location" placeholder="Enter upload location" required>
                        </label>

                        <label class="field field-full">
                            <span>Optional Image</span>
                            <input type="file" name="waste_image" accept="image/*">
                        </label>
                    </div>

                    <p class="form-message" id="uploadMessage" hidden></p>
                    <button type="submit" class="btn btn-primary form-submit" id="uploadSubmitButton">Upload Waste</button>
                </form>
            </section>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
