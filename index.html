<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle Pay | Clean & Earn</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="web-container">
        <nav class="navbar">
            <div class="logo">♻️ EcoCycle<span>Pay</span></div>
            <button class="nav-btn" onclick="location.href='dashboard.html'">Login</button>
        </nav>

        <section class="hero-section fade-in">
            <div class="hero-content">
                <span class="badge">Enyata Buildathon 2026 🚀</span>
                <h1>Cleaning the Planet, <br><span class="text-green">One Bottle at a Time.</span></h1>
                <p>Convert your plastic waste into instant digital cash. Secure, fast, and eco-friendly payouts via Interswitch.</p>
                
                <div class="hero-btns">
                    <button class="btn-primary main-cta" onclick="location.href='dashboard.html'">Start Earning</button>
                    <button class="btn-secondary">Watch Demo</button>
                </div>
            </div>
            
            <div class="hero-image slide-up">
                <img src="https://images.unsplash.com/photo-1532996122724-e3c354a0b15b?auto=format&fit=crop&q=80&w=800" alt="Recycling Concept">
                <div class="floating-card">
                    <p>Last Payout</p>
                    <strong>₦2,500.00</strong>
                </div>
            </div>
        </section>
    </div>

</html>
