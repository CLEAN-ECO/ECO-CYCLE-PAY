<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Plastic | EcoCycle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="location.href='dashboard.html'">← Back</button>
        <h2>New Collection</h2>

        <div class="camera-container">
            <video id="video-preview" autoplay playsinline></video>
            <div class="camera-overlay"></div>
        </div>

        <form id="plastic-form" class="mt-20">
            <label>Plastic Type</label>
            <select class="input-field" id="plastic-type">
                <option value="PET">PET Bottles (Clear)</option>
                <option value="HDPE">HDPE (Milk Jugs)</option>
            </select>

            <label>Estimated Weight (KG)</label>
            <input type="number" class="input-field" placeholder="e.g. 5.5" id="weight">

            <button type="button" class="btn-primary" onclick="location.href='verify.html'">
                Submit for Verification
            </button>
        </form>
    </div>
    <script src="camera.js"></script>
</body>
</html>
