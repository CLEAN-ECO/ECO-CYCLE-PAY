<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet | EcoCycle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="btn-back" onclick="location.href='dashboard.html'">← Back</button>
        <h2>My Wallet</h2>

        <div class="balance-display">
            <p>Available for Payout</p>
            <h1>₦12,450.00</h1>
        </div>

        <div class="withdraw-form mt-20">
            <label>Amount to Withdraw</label>
            <input type="number" class="input-field" placeholder="Minimum ₦1,000">
            
            <p class="small-text">Powered by <strong>Interswitch Web Checkout</strong></p>
            <button class="btn-primary" id="interswitch-btn">Process Withdrawal</button>
        </div>

        <h4 class="mt-20">Recent Payouts</h4>
        <div class="history-item">
            <span>March 21, 2026</span>
            <strong>-₦5,000.00</strong>
        </div>
    </div>
</body>
</html>
