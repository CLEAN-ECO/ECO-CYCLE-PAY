<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoCycle Pay | Recycle Center</title>
    <meta
        name="description"
        content="Choose a waste category and continue your recycling journey with EcoCycle Pay."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body id="submitPage">
    <main class="utility-page">
        <section class="utility-shell">
            <header class="page-header">
                <a href="dashboard.html" class="back-link">Back</a>
                <p class="dashboard-kicker">Recycle Center</p>
                <h1>Sort your materials and choose the next action</h1>
                <p class="page-subtitle">Pick a category below to start your next recycling submission.</p>
            </header>

            <section class="category-grid" aria-label="Waste categories">
                <article class="category-card">
                    <div class="category-icon">🧴</div>
                    <h2>Plastics</h2>
                </article>
                <article class="category-card">
                    <div class="category-icon">📄</div>
                    <h2>Papers</h2>
                </article>
                <article class="category-card">
                    <div class="category-icon">🔩</div>
                    <h2>Metals</h2>
                </article>
                <article class="category-card">
                    <div class="category-icon">🥤</div>
                    <h2>Beverage Cans</h2>
                </article>
                <article class="category-card">
                    <div class="category-icon">📦</div>
                    <h2>Cartons</h2>
                </article>
            </section>

            <section class="context-action-card">
                <div>
                    <p class="dashboard-kicker">Next step</p>
                    <h2 id="submitActionTitle">Request Pickup</h2>
                    <p id="submitActionText">Schedule a pickup for your recyclable waste.</p>
                </div>
                <a href="verify.html" class="btn btn-primary" id="submitActionButton">Request Pickup</a>
            </section>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
