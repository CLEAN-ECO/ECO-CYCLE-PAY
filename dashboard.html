<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | EcoCycle Pay</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="user-profile">
            <h3>Hello, Precious! 👋</h3>
            <p>Ready to clean the streets today?</p>
        </div>

        <div class="wallet-card-main">
            <small>Total Balance</small>
            <h1>₦12,450.00</h1>
            <button class="btn-withdraw" onclick="location.href='wallet.html'">Withdraw Funds</button>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <strong>42kg</strong>
                <p>Recycled</p>
            </div>
            <div class="stat-box">
                <strong>850</strong>
                <p>Points</p>
            </div>
        </div>

        <div class="cta-section">
            <button class="btn-primary" onclick="location.href='submit.html'">
                📸 Submit New Plastic
            </button>
        </div>
    </div>
    <script src="/app.js"></script>
</body>
</html>
