<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2>Hello, Precious 👋</h2>
  <p class="sub">Let’s earn from waste today</p>

  <!-- WALLET -->
  <div class="wallet-card">
    <p>Total Balance</p>
    <h1 id="balance">₦0</h1>
    <button class="btn-glow" onclick="go('wallet.html')">
      Withdraw
    </button>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <h3>42kg</h3>
      <p>Recycled</p>
    </div>

    <div class="stat">
      <h3>850</h3>
      <p>Points</p>
    </div>
  </div>

  <!-- ACTION -->
  <button class="btn-main" onclick="go('submit.html')">
    📸 Submit Plastic
  </button>

  <button class="btn-outline" onclick="go('verify.html')">
    ♻️ Recycler View
  </button>

</div>

<script src="app.js"></script>
</body>
</html>
