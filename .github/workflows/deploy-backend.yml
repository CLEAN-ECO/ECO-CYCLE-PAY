name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci
      
      - name: Run linter
        working-directory: ./backend
        run: npm run lint
      
      - name: Build backend
        working-directory: ./backend
        run: npm run build
      
      - name: Run tests
        working-directory: ./backend
        run: npm run test
        continue-on-error: true
      
      - name: Update Render environment variables
        run: |
          curl --request PATCH \
            --url "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}" \
            --header 'accept: application/json' \
            --header 'content-type: application/json' \
            --header 'authorization: Bearer ${{ secrets.RENDER_API_KEY }}' \
            --data '{
              "envVars": [
                {
                  "key": "NODE_ENV",
                  "value": "development"
                },
                {
                  "key": "DB_URI",
                  "value": "${{ secrets.DB_URI }}"
                },
                {
                  "key": "JWT_SECRET",
                  "value": "${{ secrets.JWT_SECRET }}"
                },
                {
                  "key": "PORT",
                  "value": "5000"
                },
                {
                  "key": "API_URL",
                  "value": "${{ secrets.API_URL }}"
                },
                {
                  "key": "REDIRECT_URL",
                  "value": "${{ secrets.REDIRECT_URL }}"
                },
                {
                  "key": "MERCHANT_CODE",
                  "value": "${{ secrets.MERCHANT_CODE }}"
                },
                {
                  "key": "PAYABLE_CODE",
                  "value": "${{ secrets.PAYABLE_CODE }}"
                },
                {
                  "key": "CLIENT_ID",
                  "value": "${{ secrets.CLIENT_ID }}"
                },
                {
                  "key": "SECRET_KEY",
                  "value": "${{ secrets.SECRET_KEY }}"
                }
              ]
            }'
      
      - name: Trigger Render deployment
        run: |
          curl --request POST \
            --url "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}" \
            --header 'accept: application/json'
      
      - name: Deployment notification
        if: success()
        run: echo "✅ Backend successfully deployed to Render"
      
      - name: Deployment failure notification
        if: failure()
        run: echo "❌ Deployment to Render failed"
        continue-on-error: true
